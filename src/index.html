<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Land</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="max-w-screen w-screen bg-brand-green">
    <!-- ! HEADER -->
    <header
      class="w-full h-27 bg-transparent backdrop-blur-md justify-center items-center border-b border-brand-darker font-semibold"
    >
      <div class="section-container flex items-center justify-between">
        <!-- ? LOGO -->
        <div
          class="flex flex-col items-center justify-center text-white gap-0.5"
        >
          <span class="h-10 w-15 relative flex items-center justify-center">
            <img
              src="./asset/chef-hat.png"
              alt="chef hat"
              class="size-14 absolute inset-0"
            />
          </span>
          <h1 class="font-logo text-3xl text-brand-gold">Happy Land</h1>
          <h2 class="uppercase tracking-widest text-xs font-normal">
            RESTAURANT
          </h2>
        </div>
        <!-- ? LINKS -->
        <nav
          class="*:capitalize *:hover:text-brand-gold-hover py-4 *:hover:border-b *:hover:border-brand-gold-hover *:[&.active]:text-brand-gold *:[&.active]:border-brand-gold *:[&.active]:border-b text-white flex items-center justify-center gap-5 font-sans *:transition-colors *:duration-300 *:py-3 *:w-18 *:text-center"
        >
          <a href="#hero" class="active">Accueil</a>
          <a href="#menu" class="">Menu</a>
          <a href="#galery" class="">Galerie</a>
          <a href="#testimonial" class="">Avis</a>
          <a href="#about" class="">à propos</a>
          <a href="#contact" class="">Contact</a>
        </nav>
        <!-- ? CTA BUTTON -->
        <button class="btn-primary text-brand-olive">Réserver une table</button>
      </div>
    </header>
    <!-- ! HEADER -->
  </body>
</html>
